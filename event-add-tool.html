<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>事件追加ツール</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f5f2;color:#2d1f14;padding:24px;max-width:900px;margin:0 auto}
h1{font-size:20px;font-weight:700;margin-bottom:4px}
.subtitle{font-size:13px;color:#8c7b6b;margin-bottom:20px}
.card{background:#fff;border-radius:16px;border:1px solid #ece8e2;padding:20px;margin-bottom:16px}
.card h2{font-size:13px;font-weight:700;color:#6b4f3a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.event-block{background:#fff;border-radius:16px;border:2px solid #ece8e2;padding:20px;margin-bottom:14px;position:relative}
.event-block.has-data{border-color:#c8b8a8}
.block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f0ede9}
.block-title{font-size:14px;font-weight:700;color:#6b4f3a}
.block-summary{font-size:11px;color:#8c7b6b;margin-left:8px}
.del-btn{background:#fee2e2;color:#dc2626;border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer}
.del-btn:hover{background:#fca5a5}
.field{margin-bottom:12px}
label{display:block;font-size:12px;font-weight:600;color:#6b4f3a;margin-bottom:4px}
input,select,textarea{width:100%;padding:8px 11px;border:1px solid #ece8e2;border-radius:9px;font-size:13px;background:#f7f5f2;color:#2d1f14;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#6b4f3a;background:#fff}
input[readonly]{background:#eef7ee;color:#2d6b2d;border-color:#a8d5a8}
textarea{resize:vertical;min-height:60px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.gym-wrap{position:relative}
.gym-dd{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #ece8e2;border-radius:10px;max-height:180px;overflow-y:auto;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.08);margin-top:3px;display:none}
.gym-item{padding:9px 13px;font-size:13px;cursor:pointer;border-bottom:1px solid #f0ede9}
.gym-item:last-child{border-bottom:none}
.gym-item:hover{background:#f7f5f2}
.gym-id-small{font-size:10px;color:#b0a899;font-family:monospace;margin-top:1px}
.gym-ok{background:#f0f9f0;border:1px solid #a8d5a8;border-radius:8px;padding:5px 10px;font-size:11px;color:#2d6b2d;margin-top:4px;display:none}
.gym-ok.show{display:block}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.type-btn{padding:7px 4px;border:1px solid #ece8e2;border-radius:8px;font-size:10px;font-weight:600;cursor:pointer;background:#f7f5f2;color:#6b4f3a;text-align:center;line-height:1.4}
.type-btn.active{background:#6b4f3a;color:#fff;border-color:#6b4f3a}
.auto-hint{font-size:11px;color:#16a34a;margin-top:3px;display:none}
.toggle-row{display:flex;gap:12px;flex-wrap:wrap}
.toggle-item{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer}
.toggle-item input[type=checkbox]{width:15px;height:15px;cursor:pointer}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.date-field{display:flex;flex-direction:column;gap:4px}
.date-field label{font-size:12px;font-weight:600;color:#6b4f3a}
.date-field input[type=date]{width:100%}
.time-toggle-row{display:flex;gap:10px;margin-top:4px;flex-wrap:wrap}
.time-toggle{display:flex;align-items:center;gap:5px;font-size:11px;color:#6b4f3a;cursor:pointer}
.time-toggle.red{color:#dc2626}
.time-toggle input{width:13px;height:13px;cursor:pointer}
.time-field{display:none;margin-top:4px}
.img-upload-area{border:2px dashed #d0c8be;border-radius:12px;padding:16px;background:#faf8f6;transition:all .2s}
.img-upload-area.drag{border-color:#6b4f3a;background:#f5f0eb}
.img-drop-zone{text-align:center;cursor:pointer;position:relative;padding:16px}
.img-drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-drop-zone .icon{font-size:24px}
.img-drop-zone .label{font-size:12px;color:#8c7b6b;margin-top:4px}
.img-drop-zone .sublabel{font-size:11px;color:#b0a899}
.img-previews{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.img-thumb{position:relative;width:80px;height:80px;border-radius:8px;overflow:hidden;border:1px solid #ece8e2}
.img-thumb img{width:100%;height:100%;object-fit:cover}
.img-thumb-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.img-uploading-badge{position:absolute;inset:0;background:rgba(255,255,255,0.8);display:flex;align-items:center;justify-content:center;font-size:10px;color:#6b4f3a}
.img-count{font-size:11px;color:#8c7b6b;margin-top:6px}
.add-btn{width:100%;padding:12px;background:#f0ede9;color:#6b4f3a;border:2px dashed #c8b8a8;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:16px}
.add-btn:hover{background:#e8e0d8}
.gen-btn{width:100%;padding:14px;background:#6b4f3a;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px}
.gen-btn:hover{background:#5a3f2c}
.line-btn{width:100%;padding:14px;background:#06C755;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;display:none;margin-top:10px}
.line-btn:hover{background:#05a847}
.line-btn:disabled{background:#a8d5b5;cursor:not-allowed}
.required{color:#e53935}
.hint{font-size:11px;color:#b0a899;margin-top:3px}
.output-wrap{display:none;margin-top:16px}
.output-wrap.show{display:block}
.sql-box{background:#1e1e1e;color:#d4d4d4;border-radius:12px;padding:16px;font-size:12px;font-family:'Courier New',monospace;white-space:pre-wrap;word-break:break-all;line-height:1.6;max-height:400px;overflow-y:auto}
.copy-btn{background:#2d1f14;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;margin-top:10px}
.copy-btn:hover{background:#111}
.copy-btn.copied{background:#16a34a}
.count-badge{background:#6b4f3a;color:#fff;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700;margin-left:8px}
.line-status{font-size:13px;margin-top:10px;padding:10px 14px;border-radius:10px;display:none}
.line-status.success{background:#f0fdf4;color:#16a34a;border:1px solid #a8d5a8;display:block}
.line-status.error{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;display:block}
.related-type-field{display:none;margin-top:10px;padding:10px 12px;background:#fff8ed;border-radius:10px;border:1px solid #fde68a}
.related-type-field label{color:#92400e}
.related-type-field select{background:#fff}
</style>
</head>
<body>

<h1>🗓 事件追加ツール</h1>
<p class="subtitle">複数の事件を一度に追加できます。画像はドラッグ＆ドロップで自動アップロード。</p>

<div class="card">
  <h2>事件リスト <span class="count-badge" id="countBadge">1</span></h2>
  <div id="eventList"></div>
  <button class="add-btn" onclick="addEvent()">＋ 事件を追加</button>
</div>

<button class="gen-btn" onclick="generateAll()">まとめてSQLを生成する</button>

<div class="output-wrap" id="outputWrap">
  <div class="card">
    <h2>生成されたSQL</h2>
    <p class="hint" style="margin-bottom:10px">Supabase SQL Editorに貼り付けて実行してください</p>
    <div class="sql-box" id="sqlOutput"></div>
    <button class="copy-btn" id="copyBtn" onclick="copySQL()">📋 コピー</button>
  </div>
</div>

<button class="line-btn" id="lineBtn" onclick="sendLineNotification()">📣 LINE に通知を送る</button>
<div class="line-status" id="lineStatus"></div>

<script>
const SUPABASE_URL='https://rwxgomnvaydpwwgdzobc.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3eGdvbW52YXlkcHd3Z2R6b2JjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4Mzc3NDIsImV4cCI6MjA4OTQxMzc0Mn0.p_b6mYPSK58v8otss2Bx_c1UFIGhxMloqSzwQcWiNUQ';
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

let gyms=[];
let eventCount=0;
const eventData={};
let generatedEvents=[];

const AUTO_TITLES={
  route_partial:{ja:'ルートセット（一部）',en:'Route Setting (partial)',zh:'换线（部分）'},
  route_all:    {ja:'ルートセット（全部）',en:'Route Setting (full)',   zh:'换线（全部）'},
  closure:      {ja:'臨時休業',            en:'Temporary Closure',      zh:'临时休业'},
  notice:       {ja:'お知らせ',            en:'Notice',                 zh:'通知'},
  hours_change: {ja:'営業時間変更',         en:'Hours Change',           zh:'营业时间更改'},
};
const AUTO_TYPES=new Set(['route_partial','route_all','closure','notice','hours_change']);
const TYPE_EMOJI={route_partial:'🟡',route_all:'🔴',competition:'🏆',event:'🎉',closure:'🔒',notice:'📢',hours_change:'🕐'};

async function loadGyms(){
  const{data}=await sb.from('gyms').select('id,name').eq('is_active',true).order('name');
  gyms=data||[];
}
loadGyms();

function uuidv4(){
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
    const r=Math.random()*16|0;
    return(c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}
function escSQL(val){
  if(val===null||val===undefined||val==='')return'NULL';
  return`'${String(val).replace(/'/g,"''")}'`;
}

function onTimeCheck(id) {
  const checked = document.getElementById('timecheck_'+id).checked;
  document.getElementById('timefield_'+id).style.display = checked ? 'block' : 'none';
  if (checked) document.getElementById('allday_'+id).checked = false;
}

function onEndTimeCheck(id) {
  const checked = document.getElementById('endtimecheck_'+id).checked;
  document.getElementById('endtimefield_'+id).style.display = checked ? 'block' : 'none';
  if (checked) document.getElementById('allday_'+id).checked = false;
}

function onAlldayCheck(id) {
  const checked = document.getElementById('allday_'+id).checked;
  if (checked) {
    document.getElementById('endtimecheck_'+id).checked = false;
    document.getElementById('endtimefield_'+id).style.display = 'none';
  }
}

function addEvent(){
  eventCount++;
  const id='ev'+eventCount;
  eventData[id]={gymId:null,gymName:null,type:null,imageUrls:[]};

  const div=document.createElement('div');
  div.className='event-block';
  div.id='block_'+id;
  div.innerHTML=`
  <div class="block-header">
    <div><span class="block-title">事件 #${eventCount}</span><span class="block-summary" id="summary_${id}"></span></div>
    <button class="del-btn" onclick="removeEvent('${id}')">削除</button>
  </div>
  <div class="row2">
    <div class="field">
      <label>ジム名 <span class="required">*</span></label>
      <div class="gym-wrap">
        <input type="text" id="gym_${id}" placeholder="ジム名で検索..." autocomplete="off" oninput="searchGym('${id}',this.value)"/>
        <div class="gym-dd" id="dd_${id}"></div>
      </div>
      <div class="gym-ok" id="gymok_${id}"></div>
    </div>
    <div class="field">
      <label>事件種別 <span class="required">*</span></label>
      <div class="type-grid" id="types_${id}">
        <div class="type-btn" onclick="selectType('${id}','route_partial',this)">🟡 ルートセット（一部）</div>
        <div class="type-btn" onclick="selectType('${id}','route_all',this)">🔴 ルートセット（全部）</div>
        <div class="type-btn" onclick="selectType('${id}','competition',this)">🏆 コンペ</div>
        <div class="type-btn" onclick="selectType('${id}','event',this)">🎉 イベント</div>
        <div class="type-btn" onclick="selectType('${id}','closure',this)">🔒 臨時休業</div>
        <div class="type-btn" onclick="selectType('${id}','notice',this)">📢 お知らせ</div>
        <div class="type-btn" onclick="selectType('${id}','hours_change',this)">🕐 営業時間変更</div>
      </div>
      <!-- お知らせ選択時のみ表示：related_type -->
      <div class="related-type-field" id="relatedtype_${id}">
        <label>📌 このお知らせはどこに表示しますか？</label>
        <select id="reltype_${id}">
          <option value="">ルートセット＆営業変更タブに表示（デフォルト）</option>
          <option value="competition">🏆 コンペタブに表示</option>
          <option value="event">🎉 イベントタブに表示</option>
        </select>
      </div>
    </div>
  </div>
  <div class="row3">
    <div class="field">
      <label>タイトル（日本語）</label>
      <input type="text" id="tja_${id}" placeholder="例：月例コンペ Vol.5"/>
      <div class="auto-hint" id="hja_${id}">✓ 自動補完済み</div>
    </div>
    <div class="field">
      <label>タイトル（English）</label>
      <input type="text" id="ten_${id}" placeholder="Optional"/>
      <div class="auto-hint" id="hen_${id}">✓ Auto-filled</div>
    </div>
    <div class="field">
      <label>タイトル（中文）</label>
      <input type="text" id="tzh_${id}" placeholder="可选"/>
      <div class="auto-hint" id="hzh_${id}">✓ 自动补全</div>
    </div>
  </div>
  <div class="field">
    <label>説明</label>
    <textarea id="desc_${id}" placeholder="詳細説明（任意）"></textarea>
  </div>

  <div class="date-row">
    <div class="date-field">
      <label>開始日 <span class="required">*</span></label>
      <input type="date" id="startdate_${id}"/>
      <div class="time-toggle-row">
        <label class="time-toggle">
          <input type="checkbox" id="timecheck_${id}" onchange="onTimeCheck('${id}')"/>
          時間あり
        </label>
      </div>
      <div class="time-field" id="timefield_${id}">
        <input type="time" id="starttime_${id}" value="10:00"/>
      </div>
    </div>
    <div class="date-field">
      <label>終了日</label>
      <input type="date" id="enddate_${id}"/>
      <div class="time-toggle-row">
        <label class="time-toggle">
          <input type="checkbox" id="endtimecheck_${id}" onchange="onEndTimeCheck('${id}')"/>
          時間あり
        </label>
        <label class="time-toggle red">
          <input type="checkbox" id="allday_${id}" onchange="onAlldayCheck('${id}')"/>
          全日休業
        </label>
      </div>
      <div class="time-field" id="endtimefield_${id}">
        <input type="time" id="endtime_${id}" value="21:00"/>
      </div>
    </div>
  </div>

  <div class="row2" style="margin-top:12px">
    <div class="field">
      <label>開催住所</label>
      <input type="text" id="loc_${id}" placeholder="東京都渋谷区..."/>
    </div>
    <div class="field">
      <label>エントリーURL</label>
      <input type="url" id="entry_${id}" placeholder="https://..."/>
    </div>
  </div>
  <div class="row2">
    <div class="field">
      <label>結果URL</label>
      <input type="url" id="results_${id}" placeholder="https://..."/>
    </div>
    <div class="field">
      <label>エントリー締切</label>
      <input type="date" id="deadline_${id}"/>
    </div>
  </div>
  <div class="field">
    <label>画像（複数可）</label>
    <div class="img-upload-area" id="imgarea_${id}"
      ondragover="event.preventDefault();document.getElementById('imgarea_${id}').classList.add('drag')"
      ondragleave="document.getElementById('imgarea_${id}').classList.remove('drag')"
      ondrop="handleDrop('${id}',event)">
      <div class="img-drop-zone">
        <input type="file" accept="image/*" multiple onchange="handleFiles('${id}',this.files)"/>
        <div class="icon">🖼</div>
        <div class="label">ドラッグ＆ドロップ または クリックで複数選択</div>
        <div class="sublabel">JPG / PNG / WEBP · 最大10枚</div>
      </div>
      <div class="img-previews" id="previews_${id}"></div>
      <div class="img-count" id="imgcount_${id}"></div>
    </div>
  </div>
  <div class="field">
    <label>オプション</label>
    <div class="toggle-row">
      <label class="toggle-item"><input type="checkbox" id="pub_${id}" checked/> 公開する</label>
      <label class="toggle-item"><input type="checkbox" id="cal_${id}" checked/> カレンダー表示</label>
      <label class="toggle-item"><input type="checkbox" id="closed_${id}"/> 全館貸切</label>
    </div>
  </div>
  `;

  document.getElementById('eventList').appendChild(div);
  updateCount();
  document.addEventListener('click', e=>{
    if(!e.target.closest('#block_'+id)) document.getElementById('dd_'+id).style.display='none';
  });
}

function removeEvent(id){
  const el=document.getElementById('block_'+id);
  if(el)el.remove();
  delete eventData[id];
  updateCount();
}

function updateCount(){
  const n=document.querySelectorAll('.event-block').length;
  document.getElementById('countBadge').textContent=n;
}

function searchGym(id,q){
  eventData[id].gymId=null;
  document.getElementById('gymok_'+id).classList.remove('show');
  const dd=document.getElementById('dd_'+id);
  if(!q){dd.style.display='none';return;}
  const filtered=gyms.filter(g=>g.name.toLowerCase().includes(q.toLowerCase()));
  if(!filtered.length){dd.style.display='none';return;}
  dd.innerHTML=filtered.map(g=>`
    <div class="gym-item" onclick="pickGym('${id}','${g.id}','${g.name.replace(/'/g,"\\'")}')">
      ${g.name}<div class="gym-id-small">${g.id}</div>
    </div>`).join('');
  dd.style.display='block';
}

function pickGym(id,gymId,gymName){
  eventData[id].gymId=gymId;
  eventData[id].gymName=gymName;
  document.getElementById('gym_'+id).value=gymName;
  document.getElementById('dd_'+id).style.display='none';
  const ok=document.getElementById('gymok_'+id);
  ok.textContent='✓ gym_id: '+gymId;
  ok.classList.add('show');
  updateSummary(id);
}

function selectType(id,type,btn){
  document.querySelectorAll('#types_'+id+' .type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  eventData[id].type=type;

  // お知らせのみ related_type 選択を表示
  const relField=document.getElementById('relatedtype_'+id);
  relField.style.display = type==='notice' ? 'block' : 'none';
  if(type!=='notice') document.getElementById('reltype_'+id).value='';

  ['ja','en','zh'].forEach(key=>{
    const input=document.getElementById('t'+key+'_'+id);
    const hint=document.getElementById('h'+key+'_'+id);
    if(AUTO_TYPES.has(type)){
      input.value=AUTO_TITLES[type][key];
      input.readOnly=true;
      hint.style.display='block';
    }else{
      input.readOnly=false;
      hint.style.display='none';
    }
  });
  if(type==='hours_change'){
    const descEl=document.getElementById('desc_'+id);
    if(descEl&&!descEl.value){
      descEl.value='本日の営業時間は〇〇:00〜〇〇:00となります。\nToday\'s hours: 〇〇:00–〇〇:00\n今日营业时间：〇〇:00～〇〇:00';
    }
  }
  updateSummary(id);
}

function updateSummary(id){
  const gym=eventData[id].gymName||'';
  const type=eventData[id].type||'';
  const tja=document.getElementById('tja_'+id)?.value||'';
  const parts=[];
  if(gym)parts.push(gym.split('|')[0]);
  if(tja)parts.push(tja);
  else if(type)parts.push(type);
  document.getElementById('summary_'+id).textContent=parts.length?'— '+parts.join(' / '):'';
  document.getElementById('block_'+id).classList.toggle('has-data',!!gym||!!type);
}

async function handleDrop(id,e){
  e.preventDefault();
  document.getElementById('imgarea_'+id).classList.remove('drag');
  const files=e.dataTransfer.files;
  if(files.length)await handleFiles(id,files);
}

async function handleFiles(id,files){
  const arr=Array.from(files).filter(f=>f.type.startsWith('image/'));
  const current=eventData[id].imageUrls.length;
  const toUpload=arr.slice(0,10-current);
  for(const file of toUpload) await uploadImage(id,file);
}

async function uploadImage(id,file){
  const previews=document.getElementById('previews_'+id);
  const thumbId='thumb_'+id+'_'+Date.now();
  const thumb=document.createElement('div');
  thumb.className='img-thumb';
  thumb.id=thumbId;
  thumb.innerHTML=`<div class="img-uploading-badge">⏫</div>`;
  previews.appendChild(thumb);

  const ext=file.name.split('.').pop()||'jpg';
  const fileName=`events/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
  const{data,error}=await sb.storage.from('gear-images').upload(fileName,file,{contentType:file.type});

  if(error){thumb.innerHTML=`<div class="img-uploading-badge" style="color:#dc2626">❌</div>`;return;}

  const publicUrl=sb.storage.from('gear-images').getPublicUrl(data.path).data.publicUrl;
  eventData[id].imageUrls.push(publicUrl);
  thumb.innerHTML=`<img src="${publicUrl}"/><button class="img-thumb-del" onclick="removeImage('${id}','${publicUrl}','${thumbId}')">×</button>`;
  updateImgCount(id);
}

function removeImage(id,url,thumbId){
  eventData[id].imageUrls=eventData[id].imageUrls.filter(u=>u!==url);
  const el=document.getElementById(thumbId);
  if(el)el.remove();
  updateImgCount(id);
}

function updateImgCount(id){
  const count=eventData[id].imageUrls.length;
  const el=document.getElementById('imgcount_'+id);
  if(el)el.textContent=count>0?`${count}枚アップロード済み`:'';
}

function buildStartDateTime(id) {
  const date = document.getElementById('startdate_'+id).value;
  if (!date) return null;
  const hasTime = document.getElementById('timecheck_'+id).checked;
  if (hasTime) {
    const time = document.getElementById('starttime_'+id).value;
    return new Date(`${date}T${time}:00`).toISOString();
  }
  return new Date(`${date}T00:00:00`).toISOString();
}

function buildEndDateTime(id) {
  const date = document.getElementById('enddate_'+id).value;
  if (!date) return null;
  const hasTime = document.getElementById('endtimecheck_'+id).checked;
  const allday = document.getElementById('allday_'+id).checked;
  if (hasTime) {
    const time = document.getElementById('endtime_'+id).value;
    return new Date(`${date}T${time}:00`).toISOString();
  }
  if (allday) {
    return new Date(`${date}T23:59:59`).toISOString();
  }
  return new Date(`${date}T00:00:00`).toISOString();
}

function generateAll(){
  const blocks=document.querySelectorAll('.event-block');
  if(!blocks.length){alert('事件を1件以上追加してください');return;}
  const sqls=[];
  generatedEvents=[];
  let hasError=false;

  blocks.forEach(block=>{
    const id=block.id.replace('block_','');
    const d=eventData[id];
    if(!d.gymId){alert(`事件 #${id.replace('ev','')}：ジムを選択してください`);hasError=true;return;}
    if(!d.type){alert(`事件 #${id.replace('ev','')}：種別を選択してください`);hasError=true;return;}
    const startVal=buildStartDateTime(id);
    if(!startVal){alert(`事件 #${id.replace('ev','')}：開始日を入力してください`);hasError=true;return;}
    const endVal=buildEndDateTime(id);

    const uid=uuidv4();
    const tja=document.getElementById('tja_'+id).value;
    const ten=document.getElementById('ten_'+id).value;
    const tzh=document.getElementById('tzh_'+id).value;
    const desc=document.getElementById('desc_'+id).value;
    const loc=document.getElementById('loc_'+id).value;
    const entry=document.getElementById('entry_'+id).value;
    const results=document.getElementById('results_'+id).value;
    const deadline=document.getElementById('deadline_'+id).value;
    const pub=document.getElementById('pub_'+id).checked;
    const cal=document.getElementById('cal_'+id).checked;
    const closed=document.getElementById('closed_'+id).checked;
    const imageUrlsJson=JSON.stringify(d.imageUrls).replace(/'/g,"''");

    // related_type: notice タイプのみ
    const relatedType = d.type==='notice'
      ? (document.getElementById('reltype_'+id).value || null)
      : null;

    // entry_deadline: 設定されていれば日付形式
    const deadlineVal = deadline ? `'${deadline}'` : 'NULL';

    generatedEvents.push({gymName:d.gymName,type:d.type,titleJa:tja,desc:desc});

    sqls.push(`-- ▼ 事件${id.replace('ev','')}：${d.gymName} / ${tja||d.type}
INSERT INTO events (id,gym_id,type,title_ja,title_en,title_zh,description,image_urls,start_at,end_at,location,entry_url,results_url,entry_deadline,is_closed_to_public,show_on_calendar,is_published,related_type)
VALUES ('${uid}','${d.gymId}','${d.type}',${escSQL(tja)},${escSQL(ten)},${escSQL(tzh)},${escSQL(desc)},'${imageUrlsJson}'::jsonb,'${startVal}',${endVal?`'${endVal}'`:'NULL'},${escSQL(loc)},${escSQL(entry)},${escSQL(results)},${deadlineVal},${closed},${cal},${pub},${escSQL(relatedType)});`);
  });

  if(hasError)return;
  const sql=sqls.join('\n\n');
  document.getElementById('sqlOutput').textContent=sql;
  document.getElementById('outputWrap').classList.add('show');
  document.getElementById('lineBtn').style.display='block';
  document.getElementById('lineStatus').className='line-status';
  document.getElementById('outputWrap').scrollIntoView({behavior:'smooth'});
}

function copySQL(){
  const sql=document.getElementById('sqlOutput').textContent;
  navigator.clipboard.writeText(sql).then(()=>{
    const btn=document.getElementById('copyBtn');
    btn.textContent='✓ コピーしました';
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='📋 コピー';btn.classList.remove('copied');},2000);
  });
}

async function sendLineNotification(){
  if(!generatedEvents.length)return;
  const btn=document.getElementById('lineBtn');
  const status=document.getElementById('lineStatus');
  btn.disabled=true;
  btn.textContent='送信中...';
  status.className='line-status';

  const lines=generatedEvents.map(ev=>{
    const emoji=TYPE_EMOJI[ev.type]||'📌';
    const gymShort=ev.gymName.split('|')[0].trim();
    const title=ev.titleJa||AUTO_TITLES[ev.type]?.ja||ev.type;
    let text=`${emoji} ${gymShort}\n${title}`;
    if(ev.desc)text+=`\n${ev.desc}`;
    return text;
  });

  const messageText=[
    '🧗 いわとも 更新情報',
    '',
    ...lines,
    '',
    '詳細はアプリで確認',
    'https://www.iwatomo.com/calendar'
  ].join('\n');

  try{
    const res=await fetch('/api/line-notify',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:messageText})
    });
    if(res.ok){
      status.textContent='✅ LINE への通知を送信しました！';
      status.className='line-status success';
      btn.textContent='✅ 送信済み';
    }else{
      const err=await res.json();
      status.textContent='❌ 送信失敗: '+(err.error||JSON.stringify(err));
      status.className='line-status error';
      btn.disabled=false;
      btn.textContent='📣 LINE に通知を送る';
    }
  }catch(e){
    status.textContent='❌ エラー: '+e.message;
    status.className='line-status error';
    btn.disabled=false;
    btn.textContent='📣 LINE に通知を送る';
  }
}

addEvent();
